<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .bg { fill: #111827; }
      .title { font: bold 24px Arial, sans-serif; fill: #f9fafb; }
      .box { fill: #1f2937; stroke: #d1d5db; stroke-width: 2; }
      .name { font: bold 19px Arial, sans-serif; fill: #f9fafb; }
      .field { font: 14px Arial, sans-serif; fill: #f9fafb; }
      .line { stroke: #d1d5db; stroke-width: 2; fill: none; }
      .label { font: bold 13px Arial, sans-serif; fill: #f9fafb; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d1d5db" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" class="bg"/>
  <text x="20" y="40" class="title">Pharmacy Management System - ER Diagram (Theoretical)</text>

  <!-- person -->
  <rect x="620" y="90" width="360" height="180" class="box"/>
  <text x="760" y="120" class="name">person</text>
  <line x1="620" y1="132" x2="980" y2="132" class="line"/>
  <text x="635" y="156" class="field">PK person_id</text>
  <text x="635" y="178" class="field">name</text>
  <text x="635" y="200" class="field">age</text>
  <text x="635" y="222" class="field">phone_number</text>

  <!-- patient -->
  <rect x="180" y="330" width="360" height="170" class="box"/>
  <text x="320" y="360" class="name">patient</text>
  <line x1="180" y1="372" x2="540" y2="372" class="line"/>
  <text x="195" y="396" class="field">PK, FK patient_id -> person.person_id</text>
  <text x="195" y="418" class="field">role-specific fields (optional)</text>

  <!-- doctor -->
  <rect x="1060" y="330" width="360" height="190" class="box"/>
  <text x="1200" y="360" class="name">doctor</text>
  <line x1="1060" y1="372" x2="1420" y2="372" class="line"/>
  <text x="1075" y="396" class="field">PK, FK doctor_id -> person.person_id</text>
  <text x="1075" y="418" class="field">specialization</text>

  <!-- medication -->
  <rect x="80" y="650" width="420" height="230" class="box"/>
  <text x="240" y="680" class="name">medication</text>
  <line x1="80" y1="692" x2="500" y2="692" class="line"/>
  <text x="95" y="716" class="field">PK medication_id</text>
  <text x="95" y="738" class="field">name</text>
  <text x="95" y="760" class="field">dosage</text>
  <text x="95" y="782" class="field">quantity</text>
  <text x="95" y="804" class="field">expiration_date</text>

  <!-- prescription -->
  <rect x="560" y="620" width="500" height="280" class="box"/>
  <text x="750" y="650" class="name">prescription</text>
  <line x1="560" y1="662" x2="1060" y2="662" class="line"/>
  <text x="575" y="686" class="field">PK prescription_id</text>
  <text x="575" y="708" class="field">FK patient_id -> patient.patient_id</text>
  <text x="575" y="730" class="field">FK doctor_id -> doctor.doctor_id</text>
  <text x="575" y="752" class="field">FK medication_id -> medication.medication_id</text>
  <text x="575" y="774" class="field">expires</text>

  <!-- doctor_patient -->
  <rect x="1130" y="650" width="400" height="190" class="box"/>
  <text x="1265" y="680" class="name">doctor_patient</text>
  <line x1="1130" y1="692" x2="1530" y2="692" class="line"/>
  <text x="1145" y="716" class="field">PK, FK doctor_id -> doctor.doctor_id</text>
  <text x="1145" y="738" class="field">PK, FK patient_id -> patient.patient_id</text>

  <!-- relationships -->
  <line x1="620" y1="230" x2="540" y2="350" class="line" marker-end="url(#arrow)"/>
  <text x="500" y="290" class="label">1 to 0..1</text>

  <line x1="980" y1="230" x2="1060" y2="350" class="line" marker-end="url(#arrow)"/>
  <text x="1020" y="290" class="label">1 to 0..1</text>

  <line x1="360" y1="500" x2="700" y2="620" class="line" marker-end="url(#arrow)"/>
  <text x="500" y="560" class="label">patient 1 to many prescriptions</text>

  <line x1="1240" y1="520" x2="900" y2="620" class="line" marker-end="url(#arrow)"/>
  <text x="980" y="570" class="label">doctor 1 to many prescriptions</text>

  <line x1="500" y1="760" x2="560" y2="760" class="line" marker-end="url(#arrow)"/>
  <text x="440" y="748" class="label">medication 1 to many prescriptions</text>

  <line x1="1130" y1="725" x2="1420" y2="430" class="line" marker-end="url(#arrow)"/>
  <text x="1320" y="560" class="label">many-to-many bridge</text>

  <line x1="1130" y1="750" x2="540" y2="430" class="line" marker-end="url(#arrow)"/>
</svg>
